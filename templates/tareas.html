<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0e0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 520px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .usuario {
            font-size: 1.1rem;
            color: #a78bfa;
            margin-bottom: 24px;
        }

        p.descripcion {
            font-size: 1rem;
            line-height: 1.6;
            color: #b0b0b0;
            margin-bottom: 30px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            color: #fff;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h1>¡Bienvenido!</h1>
        <p class="usuario">Sesión iniciada como <strong>{{ usuario }}</strong></p>
        <p class="descripcion">
            Has accedido correctamente al sistema de gestión de tareas.
            Desde aquí podrás administrar tus tareas pendientes, en progreso
            y completadas.
        </p>
        <span class="badge">Sesión activa</span>
        <footer>
            <p>Redes - PFO2 &copy; 2026</p>
        </footer>
    </div>
</body>
</html>
